.gantt-c{flex:1;position:relative;height:24px;background:#f8f9fa;border-radius:4px;overflow:hidden}

.fadein{animation:fi .25s ease}

label{font-size:12px;color:#8892b0;display:block;margin-bottom:4px}
.form-row{margin-top:10px}

</style>
</head>

h+='<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Adauga echipa noua</div>';
h+='<div class="form-row" style="margin-top:0"><label>Nume echipa</label><input type="text" id="tn" placeholder="ex: Echipa Structura"></div>';
h+='<div class="g2" style="margin-top:8px"><div><label>Nr. membri</label><input type="number" id="tm" value="4"></div><div><label>Sef echipa</label><input type="text" id="tl" placeholder="Nume..."></div></div>';
h+='<div class="form-row"><label>Categorii lucrari (selecteaza)</label><div style="display:flex;flex-wrap:wrap;gap:4px" id="tcats">';
D.cats.forEach(function(c){h+='<button class="sbtn" data-cat="'+c.id+'" onclick="togCat(this)" style="font-size:11px">'+c.ic+' '+c.n+'</button>'});
h+='</div></div>';
h+='<button class="btn btn-p" style="margin-top:12px;width:100%" onclick="addTeam()">➕ Adauga echipa</button></div>';
// List teams
if(D.teams.length>0){h+='<div style="font-size:13px;font-weight:700;margin:16px 0 8px">Echipe ('+D.teams.length+')</div>';
D.teams.forEach(function(tm,ti){var st=TST[tm.st]||TST.av;var icons=tm.cats.map(function(c){var x=D.cats.filter(function(z){return z.id===c})[0];return x?x.ic:""}).join(" ");
h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:14px;font-weight:700">👷 '+tm.n+'</div><div style="display:flex;align-items:center;gap:6px"><span class="bdg" style="color:'+st.c+';background:'+st.c+'18">'+st.l+'</span><button onclick="delTeam('+ti+')" style="background:none;border:none;cursor:pointer;font-size:16px;padding:2px">🗑️</button></div></div>';
h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px"><span style="color:#8892b0;width:80px">Membri:</span><input type="number" class="inp-sm" value="'+tm.m+'" onchange="uteam('+ti+',\'m\',this.value)"></div>';
h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px"><span style="color:#8892b0;width:80px">Sef echipa:</span><input type="text" value="'+(tm.lead||"")+'" placeholder="Nume..." onchange="uteam('+ti+',\'lead\',this.value)" style="flex:1"></div>';
h+='<div style="display:flex;gap:4px;margin-bottom:6px">';
[["av","Disponibila","#22c55e"],["wk","La lucru","#3b82f6"],["off","Libera","#94a3b8"]].forEach(function(s){var on=tm.st===s[0];h+='<button class="sbtn'+(on?" on":"")+'" onclick="uteam('+ti+',\'st\',\''+s[0]+'\')" style="border-color:'+(on?s[2]:'#ddd')+';background:'+(on?s[2]+'18':'#fff')+';color:'+s[2]+'">'+s[1]+'</button>'});
h+='</div><div style="font-size:11px;color:#8892b0">Lucrari: '+icons+'</div></div>'})}else{h+='<div class="card" style="text-align:center;padding:30px;color:#8892b0"><div style="font-size:32px;margin-bottom:8px">👷</div><div style="font-size:13px">Nicio echipa adaugata inca</div><div style="font-size:11px;margin-top:4px">Foloseste formularul de sus pentru a crea echipe</div></div>'}
h+='</div>';return h}

function pgCal(){var tw=24;var h='<div class="fadein"><div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Grafic Gantt — Planificare</div><div style="overflow-x:auto;-webkit-overflow-scrolling:touch">';
D.gantt.forEach(function(g){var l=((g.sw-1)/tw*100),w=((g.ew-g.sw+1)/tw*100);h+='<div class="gantt-r"><div class="gantt-l">'+g.ph+'</div><div class="gantt-c"><div class="gantt-b" style="left:'+l+'%;width:'+w+'%;background:'+g.c+'cc">S'+g.sw+'-S'+g.ew+'</div></div></div>'});
h+='<div style="display:flex;margin-top:6px"><div style="width:110px;flex-shrink:0"></div><div style="flex:1;display:flex">';for(var i=1;i<=6;i++)h+='<div style="flex:1;font-size:9px;color:#8892b0;text-align:center;border-top:1px solid #e8e8e8;padding-top:3px">L'+i+'</div>';
h+='</div></div></div></div></div>';return h}

function pgRap(){var today=new Date().toISOString().split("T")[0];var h='<div class="fadein"><div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Raport nou de santier</div><div class="g2"><div><label>Data</label><input type="date" id="rd" value="'+today+'"></div><div><label>Vreme</label><select id="rw"><option>☀️ Senin</option><option>⛅ Partial</option><option>☁️ Innorat</option><option>🌧️ Ploaie</option><option>❄️ Ninsoare</option><option>💨 Vant</option></select></div></div><div class="form-row"><label>Nr. muncitori</label><input type="text" id="rm" placeholder="ex: 12"></div><div class="form-row"><label>Activitati realizate</label><textarea id="rn" rows="3" placeholder="Lucrari efectuate..."></textarea></div><div class="form-row"><label>Probleme</label><textarea id="ri" rows="2" placeholder="Probleme, intarzieri..."></textarea></div><button class="btn btn-p" style="margin-top:12px;width:100%" onclick="addRpt()">✅ Salveaza raportul</button></div>';
if(D.rpts.length>0){h+='<div style="font-size:13px;font-weight:700;margin:16px 0 8px">Rapoarte anterioare</div>';D.rpts.forEach(function(r){h+='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-weight:700;font-size:13px">📋 '+r.d+'</span><span style="font-size:12px">'+r.w+'</span></div>'+(r.m?'<div style="font-size:12px;color:#8892b0;margin-bottom:4px">👷 '+r.m+'</div>':'')+'<div style="font-size:12px;margin-bottom:4px">'+r.n+'</div>'+(r.i?'<div style="font-size:12px;color:#ef4444">⚠️ '+r.i+'</div>':'')+'</div>'})}
h+='</div>';return h}

function pgSit(){var s=stats();var h='<div class="fadein"><div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Situatie lucrari — Centralizator</div><div class="tbl-wrap"><table><thead><tr><th>#</th><th>Categorie</th><th>Tot</th><th style="color:#22c55e">✓</th><th style="color:#f59e0b">⟳</th><th style="color:#ef4444">✗</th><th>%</th></tr></thead><tbody>';
D.cats.forEach(function(c,i){var comp=c.tasks.filter(function(t){return t.s==="ok"}).length;var ipr=c.tasks.filter(function(t){return t.s==="ip"}).length;var blk=c.tasks.filter(function(t){return t.s==="bl"}).length;var pct=c.tasks.length>0?Math.round(comp/c.tasks.length*100):0;h+='<tr><td style="color:#8892b0">'+(i+1)+'</td><td style="font-weight:600;white-space:normal">'+c.ic+' '+c.n+'</td><td>'+c.tasks.length+'</td><td style="color:#22c55e;font-weight:600">'+comp+'</td><td style="color:#f59e0b;font-weight:600">'+ipr+'</td><td style="color:#ef4444;font-weight:600">'+blk+'</td><td><div style="display:flex;align-items:center;gap:4px">'+pb(pct,4)+'<span style="font-size:11px;font-weight:700">'+pct+'%</span></div></td></tr>'});
h+='</tbody><tfoot><tr style="border-top:2px solid #e8e8e8;font-weight:700"><td colspan="2">TOTAL</td><td>'+s.t+'</td><td style="color:#22c55e">'+s.ok+'</td><td style="color:#f59e0b">'+s.ip+'</td><td style="color:#ef4444">'+s.bl+'</td><td style="font-size:14px;font-weight:800;color:#3b82f6">'+s.p+'%</td></tr></tfoot></table></div></div></div>';return h}

function utp(cid,ti,v){var c=D.cats.filter(function(x){return x.id===cid})[0];var t=c.tasks[ti];t.p=Number(v);t.s=t.p>=100?"ok":t.p>0?"ip":"ns";save();R()}
function uts(cid,ti,s){var c=D.cats.filter(function(x){return x.id===cid})[0];var t=c.tasks[ti];t.s=s;if(s==="ok")t.p=100;save();R()}
function umat(i,f,v){D.mats[i][f]=Number(v);save();R()}
var selCats=[];
function togCat(btn){var c=btn.getAttribute("data-cat");var i=selCats.indexOf(c);if(i>-1){selCats.splice(i,1);btn.style.borderColor="#ddd";btn.style.background="#fff";btn.style.fontWeight="400"}else{selCats.push(c);btn.style.borderColor="#3b82f6";btn.style.background="#eff6ff";btn.style.fontWeight="700"}}
function addTeam(){var n=document.getElementById("tn").value;if(!n){alert("Scrie numele echipei!");return}var m=Number(document.getElementById("tm").value)||4;var l=document.getElementById("tl").value;D.teams.push({id:"t"+Date.now(),n:n,m:m,lead:l,cats:selCats.slice(),st:"av"});selCats=[];save();R()}
function delTeam(i){if(confirm("Stergi echipa "+D.teams[i].n+"?")){D.teams.splice(i,1);save();R()}}
function uteam(i,f,v){D.teams[i][f]=(f==="m")?Number(v):v;save();R()}
function addRpt(){var n=document.getElementById("rn").value;if(!n){alert("Completati activitatile!");return}D.rpts.unshift({id:"r"+Date.now(),d:document.getElementById("rd").value,w:document.getElementById("rw").value,m:document.getElementById("rm").value,n:n,i:document.getElementById("ri").value});save();R()}
function R(){rnav();var pages={dash:pgDash,luc:pgLuc,mat:pgMat,ech:pgEch,cal:pgCal,rap:pgRap,sit:pgSit};document.getElementById("main").innerHTML=(pages[tab]||pgDash)();window.scrollTo(0,0)}
load();R();
</script>
</body>
</html>
