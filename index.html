function cp(o){return JSON.parse(JSON.stringify(o))}
function load(){try{var s=localStorage.getItem("osica5");if(s){D=JSON.parse(s);if(!D.inv)D.inv=[];if(!D.rpts)D.rpts=[];if(!D.teams)D.teams=[]}else{D=cp(INIT)}}catch(e){D=cp(INIT)}}

function fmt(v){return (v/1000).toFixed(2).replace('.',',')}
function fmtLei(v){return v.toLocaleString('ro-RO')+" lei"}
function pb(v,h,c){h=h||6;c=c||"#3b82f6";return '<div class="pbar" style="height:'+h+'px"><div class="fill" style="width:'+Math.min(100,Math.max(0,v))+'%;background:'+c+'"></div></div>'}

function catStats(cat){
  var totalVal=0,execVal=0;
  cat.items.forEach(function(it){totalVal+=it.val;execVal+=it.val*(it.p/100)});
  var pct=totalVal>0?Math.round(execVal/totalVal*100):0;
  return{totalVal:totalVal,execVal:execVal,restVal:totalVal-execVal,pct:pct}
}
function globalStats(){
  var tv=0,ev=0,items=0,done=0;
  D.cats.forEach(function(c){c.items.forEach(function(it){tv+=it.val;ev+=it.val*(it.p/100);items++;if(it.p>=100)done++})});
  return{tv:tv,ev:ev,rv:tv-ev,pct:tv>0?Math.round(ev/tv*100):0,items:items,done:done,tw:D.teams.filter(function(t){return t.st==="wk"}).length}
}

  h+='<div class="kpi-grid">';

  h+='<div class="card kpi"><div class="val" style="color:#06b6d4">'+s.tw+'</div><div class="lbl">Echipe active</div></div>';

  // Categories
  D.cats.forEach(function(c){
    var cs=catStats(c);

    h+='<div style="display:flex;justify-content:space-between;font-size:11px;margin-top:6px"><span style="color:#8892b0">Valoare: <b class="money">'+fmtLei(cs.totalVal)+'</b></span><span class="green money" style="font-weight:600">+'+fmtLei(Math.round(cs.execVal))+'</span></div>';
    h+='<div style="font-size:11px;color:#8892b0;margin-top:2px">Rest: <b class="orange money">'+fmtLei(Math.round(cs.restVal))+'</b></div></div>'});

  h+='<div class="card" style="background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Total proiect (fara TVA)</div>';
  h+='<div class="fin-row" style="border-color:rgba(255,255,255,.1)"><span class="lbl" style="color:#8892b0">Valoare totala</span><span class="val money" style="color:#fff">'+fmtLei(s.tv)+'</span></div>';
  h+='<div class="fin-row" style="border-color:rgba(255,255,255,.1)"><span class="lbl" style="color:#8892b0">Executat</span><span class="val money green">'+fmtLei(Math.round(s.ev))+'</span></div>';
  h+='<div class="fin-row" style="border:none"><span class="lbl" style="color:#8892b0">Rest de incasat</span><span class="val money orange">'+fmtLei(Math.round(s.rv))+'</span></div></div>';
  h+='</div>';return h}
